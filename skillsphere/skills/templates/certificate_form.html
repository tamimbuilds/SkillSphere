<!DOCTYPE html>
<html>
<head>
    <title>Certificate</title>
    <style>
        body { font-family: Arial; background:#eef1f5; }

        .box {
            width:450px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:8px;
        }

        input, select {
            width:100%;
            padding:8px;
            margin:6px 0;
        }

        button {
            background:#007bff;
            color:white;
            padding:10px;
            width:100%;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Upload Certificate</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Upload</button>
    </form>
</div>

</body>
</html>
