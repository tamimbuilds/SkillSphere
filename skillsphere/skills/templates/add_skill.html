<!DOCTYPE html>
<html>
<head>
    <title>Add Skill</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; }

        .form-box {
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 2px 8px rgba(0,0,0,0.2);
        }

        input, textarea {
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button {
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Add Skill</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
</div>

</body>
</html>
