<div style="display:flex;align-items:flex-start;gap:0.75rem;padding:0.8rem 0;border-bottom:1px solid var(--border);">
    <i data-lucide="{{ icon }}" style="width:14px;height:14px;color:var(--text-muted);flex-shrink:0;margin-top:0.1rem;"></i>
    <div style="flex:1;">
        <div style="font-family:var(--font-mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:0.25rem;">
            {{ label }}
        </div>
        <div style="font-size:0.9rem;color:var(--text);line-height:1.5;">
            {{ value|default:"-" }}
        </div>
    </div>
</div>
