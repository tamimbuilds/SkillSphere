<!DOCTYPE html>
<html>
<head>
    <title>Interviewers</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: #333;
        }

        table {
            width: 85%;
            margin: 30px auto;
            border-collapse: collapse;
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: center;
            border: 1px solid #ddd;
        }

        th {
            background: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #e6f2ff;
        }

        td {
            font-size: 14px;
        }

        .no-data {
            text-align: center;
            padding: 20px;
            color: #777;
        }
    </style>

</head>

<body>

<h2>Interviewers</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Designation</th>
        <th>Department</th>
        <th>Phone</th>
    </tr>

    {% for interviewer in interviewers %}
    <tr>
        <td>{{ interviewer.full_name }}</td>
        <td>{{ interviewer.email }}</td>
        <td>{{ interviewer.designation }}</td>
        <td>{{ interviewer.department }}</td>
        <td>{{ interviewer.phone }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5" class="no-data">No interviewers found</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
