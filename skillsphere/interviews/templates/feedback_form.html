{% extends "base.html" %}

{% block title %}Submit Feedback | SkillSphere{% endblock %}

{% block content %}
<div style="max-width: 580px; margin: 0 auto;">

    <!-- Back -->
    <a href="{% url 'interview_list' %}" style="
        display: inline-flex; align-items: center; gap: 0.5rem;
        font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-muted);
        text-decoration: none; margin-bottom: 2rem; transition: color var(--transition);
    " onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'">
        <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to Pipeline
    </a>

    <!-- Header -->
    <div style="margin-bottom: 2.5rem;">
        <span style="
            font-family: var(--font-mono); font-size: 0.72rem;
            letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted);
        ">Interview Review</span>
        <h1 style="
            font-family: var(--font-mono); font-size: 2rem;
            font-weight: 700; letter-spacing: -0.03em; margin-top: 0.4rem;
        ">Submit Feedback</h1>
        <p style="color: var(--text-muted); font-size: 0.88rem; margin-top: 0.3rem; font-family: var(--font-sans);">
            Provide your assessment of the candidate's performance.
        </p>
    </div>

    <!-- Form card -->
    <div class="card glass animate-fade-in" style="padding: 2.5rem;">
        <form method="post" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label for="id_feedback">Feedback</label>
                <textarea name="feedback" id="id_feedback"
                    placeholder="Write your detailed feedback about the candidate's performance…"
                    style="min-height: 140px; resize: vertical;">{{ submitted_feedback|default_if_none:"" }}</textarea>
            </div>

            <div class="form-group">
                <label for="id_score">Score <span style="color: var(--text-subtle); font-size: 0.72rem;">(0.0 – 10.0)</span></label>
                <input type="number" step="0.1" min="0" max="10" name="score" id="id_score"
                    placeholder="e.g. 8.5" value="{{ submitted_score|default_if_none:"" }}">
            </div>

            <div style="height: 1px; background: var(--border); margin: 1.5rem 0;"></div>

            <div style="display: flex; gap: 1rem; align-items: center;">
                <button type="submit" class="btn btn-primary" style="padding: 0.85rem 2rem; font-size: 0.82rem;">
                    <i data-lucide="send" style="width:14px;height:14px;"></i>
                    Submit Feedback
                </button>
                <a href="{% url 'interview_list' %}" class="btn btn-outline" style="padding: 0.85rem 2rem; font-size: 0.82rem;">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
