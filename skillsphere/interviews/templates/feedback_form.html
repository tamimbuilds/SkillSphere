<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        textarea, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        input:focus, textarea:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            width: 100%;
            background: #007bff;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>

</head>

<body>

<div class="container">
    <h2>Submit Feedback</h2>

    <form method="post">
        {% csrf_token %}
        
        <label>Feedback:</label>
        <textarea name="feedback" placeholder="Write your feedback..."></textarea>

        <label>Score:</label>
        <input type="number" step="0.1" name="score" placeholder="Enter score (e.g. 8.5)">

        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>
