[build]
builder = "RAILPACK"
buildCommand = "cd skillsphere && python manage.py collectstatic --noinput"

[deploy]
startCommand = "cd skillsphere && gunicorn skillsphere.wsgi:application --bind 0.0.0.0:$PORT"
preDeployCommand = "cd skillsphere && python manage.py migrate"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
